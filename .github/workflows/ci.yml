name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src services tests
      - name: Pytest
        run: pytest -q
  ml-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with ML extras
        run: pip install -e ".[dev,ml]"
      - name: PyTorch forward tests
        run: pytest -q tests/test_ml_model_forward.py
