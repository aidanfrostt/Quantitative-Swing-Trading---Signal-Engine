apiVersion: batch/v1
kind: CronJob
metadata:
  name: universe-cron
spec:
  schedule: "30 11 * * 1-5"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: universe
              image: signal-universe-cron:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: signal-config
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: signal-secrets
                      key: database-url
                - name: POLYGON_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: signal-secrets
                      key: polygon-api-key
---
