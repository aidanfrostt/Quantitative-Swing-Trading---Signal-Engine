apiVersion: v1
kind: Service
metadata:
  name: redpanda
spec:
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  selector:
    app: redpanda
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
          args:
            - redpanda
            - start
            - --kafka-addr=0.0.0.0:9092
            - --advertise-kafka-addr=redpanda:9092
            - --mode=dev-container
            - --smp=1
            - --memory=1G
          ports:
            - containerPort: 9092
