services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: signals
      POSTGRES_PASSWORD: signals
      POSTGRES_DB: signals
    # Host 5433 avoids clashing with a local PostgreSQL install on 5432 (common on dev machines).
    ports:
      - "5433:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18081:18081"
      - "18082:18082"

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    depends_on:
      - redpanda
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        rpk topic create ohlcv.1m ohlcv.1h ohlcv.1d news.raw --brokers redpanda:9092 || true

volumes:
  tsdata:
