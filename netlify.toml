[build]
  publish = "web"

# SPA: single index; API calls go to Railway — set API base in Netlify env and inject before deploy, or use a build script.
[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
